# Collector config used only by the OTLP integration test.
# - Receives via OTLP gRPC (4317) and HTTP (4318)
# - Logs every span to stdout (verbosity=detailed) so failed test runs
#   surface the captured spans in compose logs
# - Writes a rolling NDJSON file to /var/lib/otel/spans.json that the
#   Go test reads to assert specific spans landed

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 100ms
    send_batch_size: 64

exporters:
  debug:
    verbosity: detailed
    sampling_initial: 50
    sampling_thereafter: 50
  file/spans:
    path: /var/lib/otel/spans.json
    rotation:
      max_megabytes: 10
      max_days: 1
      max_backups: 1

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, file/spans]
