version: "3.9"

services:
  server:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.server
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - E2E_ADDR=0.0.0.0:8080
      - E2E_PROVIDER=${E2E_PROVIDER:-auto}
      - E2E_MODEL=${E2E_MODEL:-qwen3.6-plus}
      - E2E_BASE_URL=${E2E_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  webhook-echo:
    image: mendhak/http-https-echo:latest

  e2e-runner:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.e2e
    depends_on:
      server:
        condition: service_healthy
    environment:
      - SAKER_SERVER_URL=http://server:8080
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - E2E_JUDGE_PROVIDER=${E2E_JUDGE_PROVIDER:-}
      - E2E_JUDGE_MODEL=${E2E_JUDGE_MODEL:-qwen3.6-plus}
      - E2E_JUDGE_BASE_URL=${E2E_JUDGE_BASE_URL:-}
      - WEBHOOK_ECHO_URL=http://webhook-echo:8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./reports:/data/reports
