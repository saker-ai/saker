# golangci-lint v2 configuration for saker Go Agent SDK
# Run: golangci-lint run
# Docs: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  # Timeout for analysis
  timeout: 5m

issues:
  # Cap issues per linter to keep output readable
  max-issues-per-linter: 50
  # Cap repeated same-issue occurrences
  max-same-issues: 10

linters:
  # Start from zero — only enable what we explicitly list
  default: none

  enable:
    # Core correctness
    - govet        # Reports suspicious constructs (shadow, printf format mismatches, etc.)
    - errcheck     # Ensures errors are not silently dropped
    - staticcheck  # Comprehensive static analysis (SA*, S*, ST*, QF* checks)
    - ineffassign  # Detects assignments whose values are never used
    - bodyclose    # HTTP response bodies must be closed
    - unconvert    # Detects unnecessary type conversions

    # Simplification & style
    # Note: gosimple was merged into staticcheck in golangci-lint v2 (S* checks now run via staticcheck).
    - unused       # Finds unused code (functions, types, constants, variables)
    - gocritic     # Opinionated but practical code suggestions
    - revive       # Flexible, fast drop-in replacement for golint
    - prealloc     # Suggests slice pre-allocation when length is known

    # Security
    - gosec        # Security audit — detects unsafe patterns, weak crypto, etc.

    # Complexity
    - gocognit     # Cognitive complexity (more accurate than cyclomatic)

    # Spelling
    - misspell     # Fixes common English misspellings in comments and strings

  # Linters explicitly NOT enabled (too noisy or not suitable for an SDK):
  # - exhaustive        — requires all enum cases handled; overly strict for SDKs
  # - wrapcheck         — requires all errors to be wrapped; creates boilerplate
  # - nlreturn          — enforces blank lines before returns; stylistic overkill
  # - wsl               — whitespace linter; extremely opinionated, hard to satisfy
  # - gochecknoglobals  — bans package-level vars; incompatible with SDK patterns
  #                       (e.g. sentinel errors, registries, sync.Once)

  exclusions:
    # Skip auto-generated files (protobuf, mocks, bindata, etc.)
    generated: lax

    rules:
      # errcheck: test files often intentionally ignore errors (e.g. t.Log, defer f.Close)
      # gocritic/revive: test helpers and exported test types need less strictness
      # gosec/gocognit: tests intentionally trigger edge cases and have helper bodies
      - path: "_test\\.go"
        linters:
          - errcheck
          - gocritic
          - revive
          - gosec
          - gocognit
          - bodyclose

      # Generated protobuf files — skip all analysis
      - path: ".*\\.pb\\.go"
        linters:
          - govet
          - errcheck
          - staticcheck
          - gocritic
          - revive
          - gosec
          - gocognit

      # Examples are illustrative; relax doc-comment requirements
      - path: "examples/"
        linters:
          - revive
          - gosec
          - gocognit

  settings:
    govet:
      # Enable shadow checking to catch variable shadowing bugs
      enable:
        - shadow

    errcheck:
      # Do not flag ignored errors in type assertions (x, _ := y.(T))
      check-type-assertions: false
      # Do not flag blank-identifier error discards
      check-blank: false
      # Functions whose error returns are universally best-effort:
      # - fmt.Fprint* writes to CLI streams; broken-pipe is the only realistic
      #   failure mode and is not actionable from the call site.
      # - Closer.Close in defer is the canonical Go pattern; the close error
      #   either has been surfaced via the work the closer did, or we are
      #   tearing down state on the error path already.
      # - os.Remove/RemoveAll/syscall.Close are best-effort cleanup.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.DB).Close
        - os.Remove
        - os.RemoveAll
        - syscall.Close

    gocritic:
      # Enable useful extra checks beyond the defaults
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam      # Too aggressive for SDK value types
        - rangeValCopy   # Often intentional
        - unnamedResult  # Named returns are sometimes clearer
        - evalOrder      # False positive on pointer-receiver `return p, p.method()`
                         # patterns common in tea.Model.Update — mutation is
                         # visible through the captured pointer.

    revive:
      rules:
        - name: exported
          severity: warning
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"
        - name: unused-parameter
          severity: warning
        - name: error-return
          severity: warning
        - name: blank-imports
          severity: error

    misspell:
      locale: US

    gocognit:
      # Cognitive complexity threshold. Set to 50 — captures only the worst
      # offenders; tighten over time as we refactor existing legacy code.
      min-complexity: 50

    gosec:
      # Suppress checks that don't fit our context (sandboxed Bash tool, CLI).
      excludes:
        - G104  # Errors unhandled — already covered by errcheck
        - G304  # File path provided as taint input — saker is a file-touching agent
        - G401  # SHA1 — used only for non-security cache keys
        - G501  # SHA1 import — same as above
        - G601  # Range value copy implicit — Go 1.22+ fixed the loopvar issue

    prealloc:
      # Only flag clearly-bounded loops; default is too aggressive.
      simple: true
      range-loops: true
      for-loops: false

    staticcheck:
      # SA* = bugs/correctness, S* = simplifications, ST* = style, QF* = quickfixes
      checks:
        - "all"
        - "-ST1000" # Package-level doc comment; too strict for internal packages
        - "-ST1003" # Naming convention; conflicts with some Go idioms
        - "-QF1008" # Embed fields; not always desirable

# Formatters are separate from linters in golangci-lint v2
formatters:
  enable:
    - gofmt    # Enforces standard Go formatting (runs gofmt -s)

  settings:
    gofmt:
      # Apply gofmt -s simplifications (e.g. composite literals)
      simplify: true

  exclusions:
    generated: lax
