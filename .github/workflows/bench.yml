name: Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - "pkg/api/**"
      - "pkg/tool/**"
      - "pkg/middleware/**"
      - "bench/**"
      - "scripts/bench-compare.sh"
      - ".github/workflows/bench.yml"

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Informational job. Micro-benchmarks are noisy; failures here do not
    # block merges. Use the artifact for human review.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run bench-compare
        run: bash scripts/bench-compare.sh
        env:
          GOMAXPROCS: "2"

      - name: Upload current bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-current
          path: bench/current.txt
          retention-days: 30
