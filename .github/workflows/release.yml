name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Build web workspace
        run: pnpm --filter saker-web run build

      - name: Build web editor
        run: pnpm --filter saker-web-editor run build

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            web/out
            web-editor-next/out

  release:
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Embed frontend into Go binary
        run: |
          rm -rf cmd/saker/frontend/dist/_next
          mkdir -p cmd/saker/frontend/dist
          cp -r web/out/* cmd/saker/frontend/dist/
          rm -rf cmd/saker/editor/dist/_next
          mkdir -p cmd/saker/editor/dist
          cp -r web-editor-next/out/* cmd/saker/editor/dist/
          find cmd/saker/editor/dist -maxdepth 2 -name '__next.*.txt' -delete 2>/dev/null || true
          touch cmd/saker/frontend/dist/.gitkeep
          touch cmd/saker/editor/dist/.gitkeep

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME}
          BINARY=saker
          if [ "$GOOS" = "windows" ]; then
            BINARY=saker.exe
          fi
          go build -ldflags "-s -w -X main.version=${VERSION}" -trimpath -o ${BINARY} ./cmd/saker/

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCHIVE_NAME=saker-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}

          mkdir -p dist/${ARCHIVE_NAME}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp saker.exe dist/${ARCHIVE_NAME}/
          else
            cp saker dist/${ARCHIVE_NAME}/
          fi
          cp LICENSE dist/${ARCHIVE_NAME}/ 2>/dev/null || true

          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}
          else
            tar czf ${ARCHIVE_NAME}.tar.gz ${ARCHIVE_NAME}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saker-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/saker-*.*

  container:
    needs: frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Stage frontend into build context
        run: |
          rm -rf cmd/saker/frontend/dist/_next
          mkdir -p cmd/saker/frontend/dist
          cp -r web/out/* cmd/saker/frontend/dist/
          rm -rf cmd/saker/editor/dist/_next
          mkdir -p cmd/saker/editor/dist
          cp -r web-editor-next/out/* cmd/saker/editor/dist/
          find cmd/saker/editor/dist -maxdepth 2 -name '__next.*.txt' -delete 2>/dev/null || true
          touch cmd/saker/frontend/dist/.gitkeep
          touch cmd/saker/editor/dist/.gitkeep

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        if: hashFiles('Dockerfile') != ''
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Attest container build provenance
        if: steps.build.outputs.digest != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Skip notice (no Dockerfile yet)
        if: hashFiles('Dockerfile') == ''
        run: |
          echo "::notice::Dockerfile not present at repo root; skipping container build."
          echo "Add a Dockerfile to enable multi-arch GHCR publishing."

  publish:
    needs: [release, container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
        id: git-cliff

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum saker-* > checksums.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: saker
          format: spdx-json
          output-file: artifacts/sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless cosign signing (Fulcio + Rekor)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature artifacts/checksums.txt.sig \
            --output-certificate artifacts/checksums.txt.crt \
            artifacts/checksums.txt
          cosign sign-blob --yes \
            --output-signature artifacts/sbom.spdx.json.sig \
            --output-certificate artifacts/sbom.spdx.json.crt \
            artifacts/sbom.spdx.json

      - name: Optional key-based cosign signing
        if: env.COSIGN_PRIVATE_KEY != ''
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          cosign sign-blob --yes artifacts/checksums.txt \
            --output-signature artifacts/checksums.txt.keysig \
            --key env://COSIGN_PRIVATE_KEY
          cosign sign-blob --yes artifacts/sbom.spdx.json \
            --output-signature artifacts/sbom.spdx.json.keysig \
            --key env://COSIGN_PRIVATE_KEY

      - name: Generate SLSA provenance for binaries
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/saker-*
            artifacts/checksums.txt
            artifacts/sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.git-cliff.outputs.content }}
          files: |
            artifacts/*
            artifacts/checksums.txt