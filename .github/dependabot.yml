version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      web-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web-editor-next
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      web-editor-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /packages/editor-protocol
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - frontend
    groups:
      editor-protocol-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      gh-actions-minor-patch:
        update-types:
          - minor
          - patch
